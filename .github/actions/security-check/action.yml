name: "Agent Flow Security Check"
description: "Validates agent output hasn't modified forbidden files"

inputs:
  base-ref:
    description: "Base branch to diff against"
    required: true
    default: "main"

runs:
  using: composite
  steps:
    - name: Check forbidden file modifications
      shell: bash
      run: |
        echo "Checking for forbidden file modifications..."

        FORBIDDEN_PATTERNS=(
          ".github/workflows/"
          ".github/actions/"
          "types/api.d.ts"
          "bun.lock"
          ".env"
          "scripts/"
        )

        CHANGED=$(git diff --name-only "${{ inputs.base-ref }}...HEAD" 2>/dev/null || git diff --name-only HEAD~1)

        VIOLATIONS=""
        for file in $CHANGED; do
          for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
            if [[ "$file" == $pattern* ]]; then
              VIOLATIONS="$VIOLATIONS\n  - $file (matches forbidden pattern: $pattern)"
            fi
          done
        done

        if [ -n "$VIOLATIONS" ]; then
          echo "::error::Agent modified forbidden files:$VIOLATIONS"
          exit 1
        fi

        echo "✓ No forbidden file modifications detected"

    - name: Check for new dependencies
      shell: bash
      run: |
        echo "Checking for forbidden dependencies..."

        if [ -f ".agent-flow/forbidden-deps.json" ]; then
          FORBIDDEN=$(jq -r '.forbidden[]' .agent-flow/forbidden-deps.json)

          for dep in $FORBIDDEN; do
            if grep -q "\"$dep\"" package.json 2>/dev/null; then
              echo "::error::Forbidden dependency found: $dep"
              exit 1
            fi
          done
        fi

        echo "✓ No forbidden dependencies detected"

    - name: Verify no secrets in diff
      shell: bash
      run: |
        echo "Scanning for potential secrets in changes..."

        DIFF=$(git diff "${{ inputs.base-ref }}...HEAD" 2>/dev/null || git diff HEAD~1)

        SECRETS_FOUND=""
        while IFS= read -r line; do
          if [[ "$line" == +* ]] && [[ "$line" != "+++"* ]]; then
            if echo "$line" | grep -qiE '(api[_-]?key|secret[_-]?key|password|token)\s*[:=]\s*["\x27][A-Za-z0-9+/=_-]{20,}'; then
              SECRETS_FOUND="$SECRETS_FOUND\n  $line"
            fi
          fi
        done <<< "$DIFF"

        if [ -n "$SECRETS_FOUND" ]; then
          echo "::warning::Potential secrets detected in diff (review manually):$SECRETS_FOUND"
        fi

        echo "✓ Secret scan complete"

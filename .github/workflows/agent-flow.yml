name: Agent Flow

on:
  repository_dispatch:
    types: [upstream-release]
  workflow_dispatch:
    inputs:
      dashboard_sha:
        description: "Dashboard commit SHA to sync from"
        required: true
      dashboard_tag:
        description: "Dashboard release tag"
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: agent-flow-${{ github.event.client_payload.dashboard_sha || github.event.inputs.dashboard_sha }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
      strategy: ${{ steps.classify.outputs.strategy }}
      tag: ${{ steps.vars.outputs.tag }}
      sha: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile

      - name: Resolve variables
        id: vars
        run: |
          TAG="${{ github.event.client_payload.tag || github.event.inputs.dashboard_tag }}"
          SHA="${{ github.event.client_payload.dashboard_sha || github.event.inputs.dashboard_sha }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Clone dashboard repo
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          git clone --depth 1 --branch "${{ steps.vars.outputs.tag }}" \
            "https://x-access-token:${GH_TOKEN}@github.com/photon-hq/dashboard.git" \
            ../dashboard

      - name: Build upstream API types
        run: |
          cd ../dashboard
          bun install --frozen-lockfile
          bun run --filter @photon-dashboard/api-public build

      - name: Create branch
        id: branch
        run: |
          BRANCH="agent-flow/${{ steps.vars.outputs.tag }}/base"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH"

      - name: Sync API types
        run: |
          PHOTON_TYPES_SRC=../dashboard/packages/api-public/dist/index.d.ts \
            bun run sync:api

      - name: Generate diff summary
        run: bun run scripts/summarize-api-diff.ts > UPSTREAM_DIFF.md

      - name: Classify diff
        id: classify
        run: |
          if bun run scripts/diff-classifier.ts; then
            echo "strategy=trivial" >> "$GITHUB_OUTPUT"
          else
            echo "strategy=agent" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit prep changes
        run: |
          git config user.name "photon-bot"
          git config user.email "bot@photon.codes"
          git add types/api.d.ts UPSTREAM_DIFF.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync API types from dashboard@${{ steps.vars.outputs.tag }}"
          git push origin "${{ steps.branch.outputs.name }}"

  # --- Trivial path: types-only PR, no AI needed ---
  trivial-pr:
    needs: prepare
    if: needs.prepare.outputs.strategy == 'trivial'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile
      - run: bun run check

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: sync types from dashboard@${{ needs.prepare.outputs.tag }}" \
            --body "$(cat <<'EOF'
          ## Upstream version
          dashboard@${{ needs.prepare.outputs.tag }}

          ## Routes added/removed/changed
          Types-only sync — no route changes affecting CLI commands.

          ## Snapshot changes
          - (none)

          ## New runtime dependencies
          - (none)

          ## Checklist
          - [x] No edits to `types/api.d.ts` (auto-synced)
          - [x] No new runtime deps
          - [x] No snapshot changes
          - [x] `bun run check` passes
          EOF
          )" \
            --label "agent-flow" --label "agent-flow:trivial"

  # --- Non-trivial path: AI codegen ---
  agent-codegen:
    needs: prepare
    if: needs.prepare.outputs.strategy == 'agent'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [claude, codex, cursor]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile

      - name: Create agent worktree
        run: |
          AGENT_BRANCH="agent-flow/${{ needs.prepare.outputs.tag }}/${{ matrix.agent }}"
          git checkout -b "$AGENT_BRANCH"

      # --- Claude Code ---
      - name: Run Claude Code
        if: matrix.agent == 'claude'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read AGENTS.md first for the rules. Then read UPSTREAM_DIFF.md.

            The upstream Photon Dashboard released ${{ needs.prepare.outputs.tag }}.
            types/api.d.ts has already been synced.

            Your task:
            1. Run `bun run typecheck` — if it fails, fix type errors in src/commands/ and src/lib/types.ts
            2. Update or add commands for any new/changed API endpoints described in UPSTREAM_DIFF.md
            3. Update tests in tests/ to cover changes
            4. Run `bun run check` and fix any failures
            5. Commit your changes

            Budget: 25 tool calls max. Stop when `bun run check` passes.
          claude_args: "--model claude-sonnet-4-6 --max-turns 25 --allowedTools Bash,Read,Write,Edit,Glob,Grep"

      # --- Codex ---
      - name: Run Codex
        if: matrix.agent == 'codex'
        uses: openai/codex-action@v1
        with:
          prompt-file: ".github/prompts/agent-flow.md"
          model: "codex"
          sandbox: "workspace-write"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # --- Cursor SDK ---
      - name: Run Cursor SDK
        if: matrix.agent == 'cursor'
        continue-on-error: true
        run: |
          bun run scripts/agent-flow/run-cursor-agent.ts
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}

      - name: Run check gate
        id: check
        run: bun run check
        continue-on-error: true

      - name: Push if green
        if: steps.check.outcome == 'success'
        run: |
          git config user.name "photon-bot"
          git config user.email "bot@photon.codes"
          git add -A
          git diff --cached --quiet || git commit -m "feat: update CLI for dashboard@${{ needs.prepare.outputs.tag }} [${{ matrix.agent }}]"
          git push origin HEAD

      - name: Record outcome
        run: |
          mkdir -p outcomes
          echo "${{ steps.check.outcome }}" > outcomes/${{ matrix.agent }}.txt
      - uses: actions/upload-artifact@v4
        with:
          name: outcome-${{ matrix.agent }}
          path: outcomes/

  # --- Pick the winning agent ---
  pick-winner:
    needs: [prepare, agent-codegen]
    if: needs.prepare.outputs.strategy == 'agent'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: outcome-*
          merge-multiple: true
          path: outcomes

      - name: Select winner
        id: pick
        run: |
          for agent in claude codex cursor; do
            if [ "$(cat outcomes/$agent.txt 2>/dev/null)" = "success" ]; then
              echo "winner=$agent" >> "$GITHUB_OUTPUT"
              echo "Found winner: $agent"
              exit 0
            fi
          done
          echo "::error::All agents failed"
          exit 1

      - name: Open PR from winner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="agent-flow/${{ needs.prepare.outputs.tag }}/${{ steps.pick.outputs.winner }}"
          gh pr create \
            --head "$BRANCH" --base main \
            --title "feat: sync CLI with dashboard@${{ needs.prepare.outputs.tag }}" \
            --body "$(cat <<EOF
          ## Upstream version
          dashboard@${{ needs.prepare.outputs.tag }} (SHA: ${{ needs.prepare.outputs.sha }})

          ## Agent
          Winner: **${{ steps.pick.outputs.winner }}** (best-of-N: first to pass \`bun run check\`)

          ## Routes added/removed/changed
          See UPSTREAM_DIFF.md in this branch.

          ## Snapshot changes
          Review snapshot diffs in the Files Changed tab.

          ## New runtime dependencies
          - (none expected — verify in diff)

          ## Checklist
          - [x] Generated by AI agent
          - [ ] Reviewed by human
          EOF
          )" \
            --label "agent-flow" --label "agent:${{ steps.pick.outputs.winner }}"

  # --- Fallback: all agents failed ---
  all-failed:
    needs: [prepare, pick-winner]
    if: failure() && needs.prepare.outputs.strategy == 'agent'
    runs-on: ubuntu-latest
    steps:
      - name: Open triage issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Agent flow failed: dashboard@${{ needs.prepare.outputs.tag }}" \
            --body "$(cat <<EOF
          All 3 AI agents failed to produce a green \`bun run check\` for
          dashboard release **${{ needs.prepare.outputs.tag }}**.

          **Branch:** \`${{ needs.prepare.outputs.branch }}\`
          **Dashboard SHA:** ${{ needs.prepare.outputs.sha }}

          ### Next steps
          1. Check the workflow run logs for each agent
          2. Manually create a PR from the prep branch
          3. Consider running agents locally with more context

          /cc @photon-hq/cli-team
          EOF
          )" \
            --label "agent-flow" --label "needs-human"

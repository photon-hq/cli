name: "Agent: Babysit"

on:
  workflow_run:
    workflows: ["Check", "Agent: Security"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  babysit:
    # Only run if CI failed on an agent-flow PR
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      contains(github.event.workflow_run.pull_requests[0].labels.*.name, 'agent-flow')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check babysit attempts
        id: attempts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          LABELS=$(gh pr view "$PR_NUMBER" --json labels -q '.labels[].name')

          # Count existing babysit attempts
          ATTEMPT=0
          for label in $LABELS; do
            if [[ "$label" == babysit-attempt:* ]]; then
              NUM="${label#babysit-attempt:}"
              if [ "$NUM" -gt "$ATTEMPT" ]; then
                ATTEMPT=$NUM
              fi
            fi
          done

          NEXT=$((ATTEMPT + 1))
          echo "attempt=$NEXT" >> "$GITHUB_OUTPUT"
          echo "pr=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          if [ "$NEXT" -gt 3 ]; then
            echo "exceeded=true" >> "$GITHUB_OUTPUT"
          else
            echo "exceeded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Escalate if max attempts exceeded
        if: steps.attempts.outputs.exceeded == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ steps.attempts.outputs.pr }}" --add-label "needs-human"
          gh pr comment "${{ steps.attempts.outputs.pr }}" --body \
            "Babysit loop exhausted (3/3 attempts). Escalating to human review. /cc @photon-hq/cli-team"

      - name: Checkout PR
        if: steps.attempts.outputs.exceeded == 'false'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        if: steps.attempts.outputs.exceeded == 'false'
        with:
          bun-version: "1.3.13"

      - name: Get failure logs
        if: steps.attempts.outputs.exceeded == 'false'
        id: logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          gh run view "$RUN_ID" --log-failed 2>/dev/null | tail -100 > /tmp/failure-logs.txt || echo "Could not fetch logs" > /tmp/failure-logs.txt

      - name: Run fix agent
        if: steps.attempts.outputs.exceeded == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            This is babysit attempt ${{ steps.attempts.outputs.attempt }}/3.

            The previous CI run failed. Here are the failure logs:

            ```
            $(cat /tmp/failure-logs.txt)
            ```

            Read AGENTS.md for the rules. Fix the issues and make `bun run check` pass.

            Budget: 15 tool calls max. Focus on the specific failures shown above.
          claude_args: "--model claude-sonnet-4-6 --max-turns 15 --allowedTools Bash,Read,Write,Edit,Glob,Grep"

      - name: Label attempt
        if: steps.attempts.outputs.exceeded == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ steps.attempts.outputs.pr }}" \
            --add-label "babysit-attempt:${{ steps.attempts.outputs.attempt }}"

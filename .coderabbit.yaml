language: en
reviews:
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "src/commands/**"
      instructions: |
        Verify Eden API calls match the PublicApp type from @photon-ai/dashboard-api.
        Check error handling follows the getApi() + destructure { data, error, status } pattern.
        Ensure 401 responses throw SessionExpiredError.
        Verify new commands match the style in src/commands/projects.ts.
    - path: "src/lib/types.ts"
      instructions: |
        Verify DTOs are cast at the API boundary, not deep in command logic.
        Check that new fields match the actual API response shape.
        Prefer adding fields to existing DTOs over creating new types.
    - path: "tests/**"
      instructions: |
        Ensure golden output fixtures are deterministic (no timestamps, random IDs, or ANSI codes).
        Verify mock server routes match the routes used in the command being tested.
        Check that tests use bun:test imports, not jest or vitest.
    - path: ".github/**"
      instructions: |
        This is infrastructure. Only flag security issues (exposed secrets, overly broad permissions).
  path_filters:
    - "!bun.lock"
    - "!dist/**"
chat:
  auto_reply: true
